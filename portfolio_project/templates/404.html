{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{% static 'css/custom.css' %}" />
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#0d1117; font-family:'JetBrains Mono',monospace; }
  .err-box { text-align:center; padding:3rem 2rem; }
  .err-code { font-size:6rem; font-weight:700; color:#f85149; line-height:1; }
  .err-title { font-size:1.25rem; color:#e6edf3; margin:1rem 0 0.5rem; }
  .err-sub { color:#8b949e; font-size:0.9rem; margin-bottom:2rem; }
  .err-link { display:inline-block; padding:0.6rem 1.5rem; border:1px solid #f85149; color:#f85149; text-decoration:none; border-radius:4px; transition:background 0.2s; }
  .err-link:hover { background:#f8514920; }
  .err-prompt { color:#3fb950; margin-bottom:1.5rem; font-size:0.85rem; }
</style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">404</div>
    <p class="err-prompt">visitor@portfolio:~$ find /page -name "{{ request.path|slice:'1:' }}"<br>find: no such file or directory</p>
    <p class="err-title">Page Not Found</p>
    <p class="err-sub">The resource you requested does not exist or has been moved.</p>
    <a href="/" class="err-link">← Return Home</a>
  </div>
</body>
</html>
