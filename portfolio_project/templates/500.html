{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>500 — Server Error</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{% static 'css/custom.css' %}" />
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#0d1117; font-family:'JetBrains Mono',monospace; }
  .err-box { text-align:center; padding:3rem 2rem; }
  .err-code { font-size:6rem; font-weight:700; color:#d29922; line-height:1; }
  .err-title { font-size:1.25rem; color:#e6edf3; margin:1rem 0 0.5rem; }
  .err-sub { color:#8b949e; font-size:0.9rem; margin-bottom:2rem; }
  .err-link { display:inline-block; padding:0.6rem 1.5rem; border:1px solid #d29922; color:#d29922; text-decoration:none; border-radius:4px; transition:background 0.2s; }
  .err-link:hover { background:#d2992220; }
  .err-prompt { color:#f85149; margin-bottom:1.5rem; font-size:0.85rem; }
</style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">500</div>
    <p class="err-prompt">SYSTEM ERROR — KERNEL PANIC<br>Unexpected exception in request pipeline</p>
    <p class="err-title">Internal Server Error</p>
    <p class="err-sub">Something went wrong on our end. The issue has been logged.</p>
    <a href="/" class="err-link">← Return Home</a>
  </div>
</body>
</html>
